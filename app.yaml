    valueFrom: databricks_token_secret
  - name: DATABRICKS_HOST
    value: "https://dbc-0726d26f-3749.cloud.databricks.com"
  - name: SERVING_ENDPOINT_NAME
    valueFrom: serving_endpoint

resources:
